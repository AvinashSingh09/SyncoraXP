services:
  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
          node_ip: ${LIVEKIT_NODE_IP:-103.189.88.94}
        keys:
          LK_LOCAL_CDB65FCC665488BFC3: SgEYQ4O4gRYwkezloQgrUaKELY9U00hQEF5eDuyoAy0
          syncoraxp-production-api-key: syncoraxp-production-api-secret
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - livekit

  translation-worker:
    build:
      context: .
      dockerfile: apps/translation-worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - livekit
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      LIVEKIT_DOMAIN_NAME: ${LIVEKIT_DOMAIN_NAME}
    depends_on:
      - api
      - web
      - livekit

volumes:
  caddy_data:
  caddy_config:
